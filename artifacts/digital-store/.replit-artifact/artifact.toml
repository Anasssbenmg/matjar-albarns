kind = "web"
previewPath = "/"
title = "Digital Products Store"
version = "1.0.0"
id = "artifacts/digital-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26058

[services.development]
run = "pnpm --filter @workspace/digital-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-store", "run", "build" ]
publicDir = "artifacts/digital-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26058"
BASE_PATH = "/"
