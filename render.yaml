services:
  - type: web
    name: matjar-albarns-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  - type: static
    name: matjar-albarns
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/digital-store run build
    staticPublishPath: artifacts/digital-store/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
